replicaCount: 1

image:
  registry: harbor.example.com
  project: book-club
  pullPolicy: IfNotPresent
  tag: latest

imagePullSecrets:
  - name: harbor-registry-secret

backend:
  name: backend
  replicaCount: 2
  port: 8000
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  env:
    - name: BASE_URL
      value: "https://book-club.example.com"
    - name: DATABASE_URL
      valueFrom:
        secretKeyRef:
          name: book-club-secrets
          key: database-url

frontend:
  name: frontend
  replicaCount: 2
  port: 80
  resources:
    limits:
      cpu: 200m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

postgres:
  enabled: true
  name: postgres
  port: 5432
  image: postgres:16-alpine
  storage: 10Gi
  storageClassName: standard
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 250m
      memory: 256Mi
  env:
    - name: POSTGRES_DB
      value: postgres
    - name: POSTGRES_USER
      value: postgres
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          name: book-club-secrets
          key: postgres-password

service:
  type: ClusterIP
  backend:
    port: 8000
    targetPort: 8000
  frontend:
    port: 80
    targetPort: 80
  postgres:
    port: 5432
    targetPort: 5432

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: bookclub.example.com
      paths:
        - path: /api
          pathType: Prefix
          backend: backend
        - path: /admin
          pathType: Prefix
          backend: backend
        - path: /
          pathType: Prefix
          backend: frontend
  tls:
    - secretName: bookclub-tls
      hosts:
        - bookclub.example.com

vault:
  enabled: true
  address: https://vault.example.com
  role: book-club
  secretPath: secret/data/book-club
