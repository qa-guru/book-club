{{- if .Values.monitoring.prometheus.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "book-club.fullname" . }}-backend
  labels:
    {{- include "book-club.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  selector:
    matchLabels:
      {{- include "book-club.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  endpoints:
  - port: http
    path: /metrics
    interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
    scrapeTimeout: {{ .Values.monitoring.prometheus.scrapeTimeout }}
    headers:
      Host: localhost
    # Add application label for Grafana dashboards
    relabelings:
    - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
      targetLabel: application
    - sourceLabels: [__meta_kubernetes_pod_label_app_kubernetes_io_component]
      targetLabel: component
    - sourceLabels: [__meta_kubernetes_namespace]
      targetLabel: namespace
    - sourceLabels: [__meta_kubernetes_pod_name]
      targetLabel: pod
    - sourceLabels: [__meta_kubernetes_pod_node_name]
      targetLabel: node
---
{{- if .Values.postgres.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "book-club.fullname" . }}-postgres
  labels:
    {{- include "book-club.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  selector:
    matchLabels:
      {{- include "book-club.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres
  endpoints:
  - port: metrics
    interval: {{ .Values.monitoring.prometheus.scrapeInterval }}
    scrapeTimeout: {{ .Values.monitoring.prometheus.scrapeTimeout }}
{{- end }}
{{- end }}
