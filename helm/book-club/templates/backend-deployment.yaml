apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "book-club.fullname" . }}-backend
  labels:
    {{- include "book-club.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      {{- include "book-club.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "book-club.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      annotations:
        {{- if .Values.monitoring.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.backend.port }}"
        prometheus.io/path: "/metrics"
        {{- end }}
        {{- if .Values.monitoring.pyroscope.enabled }}
        pyroscope.io/scrape: "true"
        pyroscope.io/application-name: "{{ include "book-club.fullname" . }}-backend"
        pyroscope.io/profile-cpu-enabled: "true"
        pyroscope.io/profile-mem-enabled: "true"
        pyroscope.io/port: "{{ .Values.backend.port }}"
        {{- end }}
        {{- if .Values.monitoring.tempo.enabled }}
        tempo.grafana.com/scrape: "true"
        {{- end }}
    spec:
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
      - name: backend
        image: "{{ .Values.image.registry }}/{{ .Values.image.project }}/{{ .Values.backend.name }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.backend.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/v1/healthchecks/
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/v1/healthchecks/
            port: http
            httpHeaders:
            - name: Host
              value: localhost
          initialDelaySeconds: 15
          periodSeconds: 5
        env:
          {{- toYaml .Values.backend.env | nindent 10 }}
          {{- if .Values.monitoring.tempo.enabled }}
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: "{{ .Values.monitoring.tempo.endpoint }}"
          - name: OTEL_SERVICE_NAME
            value: "{{ include "book-club.fullname" . }}-backend"
          - name: OTEL_TRACES_EXPORTER
            value: "otlp"
          - name: OTEL_METRICS_EXPORTER
            value: "none"
          - name: OTEL_LOGS_EXPORTER
            value: "none"
          {{- end }}
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
