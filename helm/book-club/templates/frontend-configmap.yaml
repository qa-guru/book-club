apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "book-club.fullname" . }}-frontend-config
  labels:
    {{- include "book-club.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
data:
  config.js: |
    // Runtime configuration injected by Kubernetes
    window.__ENV__ = {
      VITE_OTEL_ENDPOINT: {{ .Values.monitoring.tempo.enabled | ternary (printf "'%s'" .Values.monitoring.tempo.httpEndpoint) "''" }},
      VITE_APP_VERSION: '{{ .Values.image.tag }}'
    }
