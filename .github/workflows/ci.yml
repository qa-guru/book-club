name: CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'helm/**'
      - '.github/workflows/ci.yml'

env:
  VAULT_ADDR: https://vault.qa.guru
  HARBOR_REGISTRY: harbor.qa.guru
  HARBOR_PROJECT: qa-guru-internal
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # Detect what changed to optimize builds
  changes:
    runs-on: arc-runner-set
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            helm:
              - 'helm/**'

  build-and-push:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.helm == 'true'
    runs-on: arc-runner-set
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ env.VAULT_ADDR }}
          method: approle
          roleId: ${{ secrets.VAULT_ROLE_ID }}
          secretId: ${{ secrets.VAULT_SECRET_ID }}
          secrets: |
            kv/data/arc/harbor_credentials username | HARBOR_USERNAME ;
            kv/data/arc/harbor_credentials password | HARBOR_PASSWORD

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ env.HARBOR_USERNAME }}
          password: ${{ env.HARBOR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/backend:latest
          cache-from: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/backend:buildcache
          cache-to: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/backend:buildcache,mode=max
          build-args: |
            PYTHON_VERSION=3.12

      - name: Build and push frontend image
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/frontend:latest
          cache-from: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/frontend:buildcache
          cache-to: type=registry,ref=${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}/frontend:buildcache,mode=max

      - name: Install Helm
        if: github.event_name == 'push'
        uses: azure/setup-helm@v4
        with:
          version: '3.14.0'

      - name: Package Helm chart
        if: github.event_name == 'push'
        run: |
          cd helm
          helm package book-club --version 1.0.${{ github.run_number }} --app-version ${{ env.IMAGE_TAG }}

      - name: Push Helm chart to Harbor
        if: github.event_name == 'push'
        run: |
          cd helm
          
          # Debug: Check if credentials are set
          echo "Registry: ${{ env.HARBOR_REGISTRY }}"
          echo "Project: ${{ env.HARBOR_PROJECT }}"
          echo "Username length: ${#HARBOR_USERNAME}"
          echo "Password length: ${#HARBOR_PASSWORD}"
          
          # Login to Harbor OCI registry
          # Note: Using printf instead of echo to handle special characters
          printf '%s\n' "${HARBOR_PASSWORD}" | helm registry login ${{ env.HARBOR_REGISTRY }} \
            --username "${HARBOR_USERNAME}" \
            --password-stdin
          
          # Push chart
          helm push book-club-1.0.${{ github.run_number }}.tgz oci://${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}

  lint-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - uses: ./.github/actions/setup-project
      
      - name: Install dev dependencies
        run: task install-dev-deps
        shell: bash
      
      - name: Run lint
        run: task lint

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - uses: ./.github/actions/setup-project
      
      - name: Install dev dependencies
        run: task install-dev-deps
        shell: bash
      
      - name: Start services
        run: docker-compose up -d
        working-directory: .
      
      - name: Run tests
        run: uv run pytest --create-db --reuse-db --exitfirst --alluredir=allure-results

  lint-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run ESLint
        run: pnpm run lint

  type-check-frontend:
    runs-on: arc-runner-set
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Run Type Check
        run: pnpm run type-check
