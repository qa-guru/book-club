---
x-default-build-args: &default-build-args
  PYTHON_VERSION: "3.12"

x-default-environment: &default-environment
  BASE_URL: http://bookclub.qa.guru
  DATABASE_URL: postgres://postgres@postgres:5432/postgres

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ./Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - bookclub
    depends_on:
      - backend

  postgres:
    image: postgres:16-alpine
    container_name: db
    environment:
      - POSTGRES_HOST_AUTH_METHOD=trust
    networks:
     - bookclub
    command: --autovacuum=off --fsync=off --synchronous_commit=off --full_page_writes=off --work_mem=12MB --max-connections=10 --max_wal_senders=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    container_name: back
    build:
      context: ./backend
      target: web
      args: *default-build-args
    environment: *default-environment
    ports:
      - "8000:8000"
    networks:
     - bookclub
    depends_on:
      postgres:
        condition: service_healthy

networks:
  bookclub:
